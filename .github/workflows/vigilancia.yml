name: Vigilancia Trenes

on:
  schedule:
    - cron: '*/20 * * * *'  # Se ejecuta cada 20 minutos
    - cron: '0 8 * * *'     # 10:00 AM en España (8:00 UTC)
    - cron: '0 20 * * *'    # 22:00 PM en España (20:00 UTC)
  workflow_dispatch:        # Permite el botón "Run workflow" manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4 pytz

      - name: Ejecutar Bot
        run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
