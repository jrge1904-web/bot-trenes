name: Vigilancia Trenes
on:
  schedule:
    - cron: '*/20 * * * *'  # Cada 20 min
    - cron: '0 8 * * *'     # 10:00 AM en España (GitHub usa hora UTC, 8+2=10)
    - cron: '0 20 * * *'    # 22:00 PM en España (20+2=22)
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests beautifulsoup4 pytz
      - run: python bot.py
